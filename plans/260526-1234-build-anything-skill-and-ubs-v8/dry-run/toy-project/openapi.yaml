openapi: 3.0.3
info:
  title: Toy Orders API
  version: 0.0.1
paths:
  /api/orders:
    get:
      responses:
        '200':
          description: list
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Order' }
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/OrderCreate' }
      responses:
        '200':
          description: created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
  /api/orders/{id}:
    get:
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: one
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Order' }
components:
  schemas:
    Order:
      type: object
      required: [id, tenant_id, total]
      properties:
        id: { type: integer }
        tenant_id: { type: string }
        total: { type: integer }
    OrderCreate:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            type: object
            required: [amount]
            properties: { amount: { type: integer } }
